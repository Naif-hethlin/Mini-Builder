# docker compose stack for the Mini Website Builder.
#
# Brings up Postgres 16 + the Next.js app together so you can do
#   docker compose up
# and open http://localhost:3000.
#
# Override the dev-only credentials by creating a .env file next to
# this docker-compose.yml. At minimum:
#   POSTGRES_PASSWORD=<change-me>
#   SESSION_SECRET=<32+ char random>

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rekaz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rekaz-dev-only-replace-me}
      POSTGRES_DB: ${POSTGRES_DB:-rekaz_builder}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rekaz}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgres://${POSTGRES_USER:-rekaz}:${POSTGRES_PASSWORD:-rekaz-dev-only-replace-me}@postgres:5432/${POSTGRES_DB:-rekaz_builder}
      - SESSION_SECRET=${SESSION_SECRET:-rekaz-dev-only-32-byte-secret-replace}

volumes:
  postgres_data:
